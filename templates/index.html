<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Hotspot Monitor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Real-Time Hotspot Monitor</h1>
            <div id="status">Status: <span>Connecting...</span></div>
        </header>

        <main>
            <section class="top-user-card">
                <h2>Top Data User</h2>
                <div id="top-user" class="highlight">
                    <p>Calculating...</p>
                </div>
            </section>

            <section class="chart-container">
                <h2>Live Bandwidth Usage</h2>
                <div class="canvas-wrapper" style="position: relative; height: 300px;">
                    <canvas id="usageChart"></canvas>
                </div>
            </section>

            <section class="devices-list">
                <h2>Connected Devices</h2>
                <table>
                    <thead>
                        <tr>
                            <th>IP Address</th>
                            <th>MAC Address</th>
                            <th>Device Name</th>
                            <th>Data Used</th>
                        </tr>
                    </thead>
                    <tbody id="devices-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
